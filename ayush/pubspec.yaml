name: ayush
description: AI-Powered Ayurvedic Healthcare Platform
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Network
  dio: ^5.4.3+1

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2
  flutter_dotenv: ^5.1.0

  # UI / Animations
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  fl_chart: ^0.69.0
  shimmer: ^3.0.0
  google_fonts: ^6.2.1

  # File Handling
  file_picker: ^8.1.2
  image_picker: ^1.1.2

  # Utils
  intl: ^0.20.2
  uuid: ^4.4.2
  permission_handler: ^11.3.1
  path_provider: ^2.1.4
  http_parser: ^4.1.1
  country_code_picker: ^3.0.0
  url_launcher: ^6.3.2
  flutter_tts: ^4.2.5
  webview_flutter: ^4.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - .env
    - assets/images/
    - assets/lottie/
    - assets/l10n/
    - assets/data/
    - assets/yoga/

  fonts: []
